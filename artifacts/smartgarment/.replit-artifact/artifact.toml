kind = "web"
previewPath = "/"
title = "SmartGarment Dashboard"
version = "1.0.0"
id = "artifacts/smartgarment"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25023

[services.development]
run = "pnpm --filter @workspace/smartgarment run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smartgarment", "run", "build" ]
publicDir = "artifacts/smartgarment/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25023"
BASE_PATH = "/"
